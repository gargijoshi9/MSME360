version: '3.9'

services:
  chromadb:
    image: chromadb/chroma:0.5.11
    container_name: msme360-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
    restart: unless-stopped

volumes:
  model_cache:
    driver: local
  chroma_data:
    driver: local
  uploads:
    driver: local
